services:
  api:
    build:
      context: ./CustodyManagementApi
      dockerfile: Dockerfile
    container_name: custody-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=custodydb;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: custody-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: custodydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d custodydb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
